<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Dad ❤️ | By Mihir</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#4facfe,#00f2fe,#43e97b,#38f9d7);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:420px;
    padding:25px;
    text-align:center;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(12px);
    border-radius:25px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    animation:pop 1s ease;
    z-index:10;
}

@keyframes pop{
    from{
        transform:scale(0.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

h1{
    color:white;
    font-size:2rem;
    margin-bottom:15px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white;
    } 
    to{
        text-shadow:0 0 25px #00e5ff;
    }
}

.message{
    color:white;
    line-height:1.8;
    font-size:1rem;
}

.signature{
    margin-top:20px;
    color:white;
    font-size:1.2rem;
    font-weight:bold;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#0077ff;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:.3s;
} animation:glow 2s infinite alternate;

button:hover{
    transform:scale(1.08);
}

.star{
    position:absolute;
    color:white;
    font-size:20px;
    animation:float 7s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Happy Father's day ❤️</h1>

    <div class="message">
        👨‍👦 Dear Dad 👨‍👦<br><br>
 
        Thank you for being my hero, my guide,
        and my biggest supporter. 💙<br><br>
 Your hard work, sacrifices, and love inspire me every day. ⭐<br><br>
No matter how big I grow,
 I will always look up to you. 🥰<br><br>
 Thank you for everything, Dad.
        I love you so much! ❤️
    </div>

    <div class="signature">
        💙 By MIHIR 💙
    </div>

    <button onclick="celebrate()">
        🎉 Click Here Dad 🎉
    </button>
</div>

<script>
// Auto Confetti
setTimeout(()=>{
    confetti({
        particleCount:250,
        spread:180,
        origin:{y:0.6}
    });
},500);

// Button Confetti
function celebrate(){
    confetti({
        particleCount:350,
        spread:220,
        origin:{y:0.5}
    });
}

// Floating Stars
function createStar(){
    const star=document.createElement("div");
    star.classList.add("star");
    star.innerHTML=["⭐","✨","💙","🌟"][Math.floor(Math.random()*4)];

    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(Math.random()*4+4)
    document.body.appendChild(star);

    setTimeout(()=>{
        star.remove();
    },8000);
}

setInterval(createStar,400);
</script>

</body>
</html>
